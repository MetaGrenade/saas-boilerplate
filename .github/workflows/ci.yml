name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Node ${{ matrix.node-version }} checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint workspaces
        run: pnpm lint

      - name: Type check backend
        run: pnpm exec tsc --project packages/backend/tsconfig.json --noEmit

      - name: Type check frontend
        run: pnpm exec tsc --project packages/frontend/tsconfig.json --noEmit

      - name: Backend unit tests
        run: pnpm --filter backend --if-present test

      - name: Frontend unit tests
        run: pnpm --filter frontend --if-present test

      - name: Build workspaces
        run: pnpm build

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: CDKTF synth
        run: |
          if [ -f packages/infra/cdktf.json ]; then
            pnpm --filter infra exec cdktf synth
          else
            echo "Skipping cdktf synth because packages/infra/cdktf.json was not found."
          fi

  build-docker-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Dockerfiles
        shell: bash
        env:
          IMAGE_PREFIX: ghcr.io/${{ github.repository }}
        run: |
          set -euo pipefail
          mapfile -t dockerfiles < <(
            find . \
              -path './.git' -prune -o \
              -path '*/node_modules/*' -prune -o \
              -type f \( -iname 'Dockerfile' -o -iname 'Dockerfile.*' -o -iname '*.Dockerfile' \) \
              -print \
            | sort
          )
          if [ "${#dockerfiles[@]}" -eq 0 ]; then
            echo "No Dockerfiles found. Skipping build stage."
            exit 0
          fi

          for dockerfile in "${dockerfiles[@]}"; do
            context_dir=$(dirname "$dockerfile")
            relative_path=${dockerfile#./}
            sanitized_tag=$(echo "$relative_path" | tr '[:upper:]' '[:lower:]' | sed \
              -e 's/[^a-z0-9]/-/g' \
              -e 's/-\{2,\}/-/g' \
              -e 's/^-//' \
              -e 's/-$//')
            if [ -z "$sanitized_tag" ]; then
              sanitized_tag=image
            fi
            tag="$IMAGE_PREFIX:${sanitized_tag}-ci"
            echo "::group::Building ${dockerfile}"
            docker build --file "$dockerfile" "$context_dir" --tag "$tag"
            echo "Tagged image as $tag"
            echo "::endgroup::"
          done
  publish-docker:
    name: Publish Docker image (stub)
    needs:
      - build-and-test
      - build-docker-images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          echo "Stub: replace with docker buildx build and push commands for ghcr.io/${{ github.repository }}"
